name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction --force

      - name: Run tests
        run: php artisan test --compact

      - name: Install production Composer dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Determine Pages base path
        id: pages
        run: |
          if [ -f public/CNAME ]; then
            CUSTOM_DOMAIN="$(tr -d '[:space:]' < public/CNAME)"
            echo "base_path=./" >> "$GITHUB_OUTPUT"
            echo "site_url=https://${CUSTOM_DOMAIN}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
            echo "base_path=/" >> "$GITHUB_OUTPUT"
            echo "site_url=https://${{ github.repository_owner }}.github.io" >> "$GITHUB_OUTPUT"
          else
            echo "base_path=/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"
            echo "site_url=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build static site
        env:
          VITE_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          GITHUB_PAGES_URL: ${{ steps.pages.outputs.site_url }}
        run: bash scripts/build-github-pages.sh

      - name: Verify build output
        run: |
          test -f dist/index.html
          ! grep -q 'href="/tokentosser/build/' dist/index.html

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: dist
          retention-days: 1

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: dist

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
